name: Diagnostic — Enumerate Gemini Models

on:
  workflow_dispatch:

jobs:
  enumerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install google-genai
        run: pip install "google-genai>=2.0.0"

      - name: List available Gemini models and confirm gemini-2.5-flash
        env:
          GOOGLE_GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI_API_KEY }}
        run: |
          python - << 'PYEOF'
          import os, sys
          from google import genai

          api_key = os.environ['GOOGLE_GEMINI_API_KEY']
          client = genai.Client(api_key=api_key)

          print("=== Available Gemini models ===")
          found_25_flash = False
          for m in client.models.list():
              name = getattr(m, 'name', str(m))
              display = getattr(m, 'display_name', '') or ''
              print(f"  {name}  ({display})")
              if 'gemini-2.5-flash' in name and 'image' not in name.lower():
                  found_25_flash = True

          print()
          if found_25_flash:
              print("CONFIRMED: gemini-2.5-flash is available for this API key.")
              sys.exit(0)
          else:
              print("WARNING: gemini-2.5-flash not found for this API key!")
              sys.exit(1)
          PYEOF
