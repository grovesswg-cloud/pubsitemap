name: LORD — Publish Daily Bulletins

on:
  schedule:
    - cron: '0 7 * * *'    # 07:00 UTC — Morning dispatch
    - cron: '0 12 * * *'   # 12:00 UTC — Midday dispatch
    - cron: '0 17 * * *'   # 17:00 UTC — Afternoon dispatch
    - cron: '0 22 * * *'   # 22:00 UTC — Evening dispatch
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so the push doesn't reject
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: automation/requirements.txt

      - name: Install automation dependencies
        run: pip install -r automation/requirements.txt

      - name: Run LORD publication cycle
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          NEWS_API_KEY:        ${{ secrets.NEWS_API_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:     ${{ secrets.PIXABAY_API_KEY }}
        run: |
          cd automation
          python scheduler.py --run-now

      - name: Commit and push new content
        run: |
          git config user.name  "LORD Publisher"
          git config user.email "publisher@lord.music"
          git add site/articles/ site/api/articles.json
          if git diff --staged --quiet; then
            echo "No new content to commit."
          else
            git commit -m "publish: bulletin $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin HEAD
          fi
