name: LORD — Publish Reviews

on:
  schedule:
    - cron: '0 8 * * *'    # 08:00 UTC daily
    - cron: '0 14 * * *'   # 14:00 UTC daily
    - cron: '0 20 * * *'   # 20:00 UTC daily
    - cron: '0 10 1 * *'   # 1st of month — classic album review
  workflow_dispatch:
    inputs:
      review_type:
        description: 'Review type to publish'
        type: choice
        options:
          - review
          - classic-review
        default: review

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: automation/requirements.txt

      - name: Install automation dependencies
        run: pip install -r automation/requirements.txt

      - name: Determine review type
        id: review_type
        run: |
          INPUT_TYPE="${{ github.event.inputs.review_type }}"
          if [ -n "$INPUT_TYPE" ]; then
            echo "type=$INPUT_TYPE" >> $GITHUB_OUTPUT
          elif [ "$(date -u +'%d')" = "01" ]; then
            echo "type=classic-review" >> $GITHUB_OUTPUT
          else
            echo "type=review" >> $GITHUB_OUTPUT
          fi

      - name: Run LORD review cycle
        env:
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY:        ${{ secrets.UNSPLASH_ACCESS_KEY }}
          NEWS_API_KEY:               ${{ secrets.NEWS_API_KEY }}
          PEXELS_API_KEY:             ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:            ${{ secrets.PIXABAY_API_KEY }}
          GOOGLE_INDEXING_KEY:        ${{ secrets.GOOGLE_INDEXING_KEY }}
          GOOGLE_GEMINI_API_KEY:      ${{ secrets.GOOGLE_GEMINI_API_KEY }}
          SITE_DOMAIN:                ${{ secrets.SITE_DOMAIN }}
          QUALITY_IMAGE_VALIDATION:   'true'
        run: |
          cd automation
          python scheduler.py --run-now --type ${{ steps.review_type.outputs.type }}

      - name: Commit and push new content
        run: |
          git config user.name  "LORD Publisher"
          git config user.email "publisher@lord.music"
          git add site/articles/ site/api/articles.json site/sitemap.xml
          if git diff --staged --quiet; then
            echo "No new content to commit."
          else
            git commit -m "publish: ${{ steps.review_type.outputs.type }} $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin HEAD
          fi
