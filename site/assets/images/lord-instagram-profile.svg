<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Background -->
  <rect width="500" height="500" fill="#080808"/>

  <!-- Thin gold top rule -->
  <rect x="48" y="62" width="404" height="2" fill="#c9a84c"/>
  <rect x="48" y="70" width="404" height="1" fill="#c9a84c" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="250" y="300"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="220"
        font-weight="700"
        letter-spacing="-4"
        fill="#c9a84c">L</text>

  <!-- Tagline -->
  <text x="250" y="382"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="28"
        font-weight="400"
        letter-spacing="12"
        fill="#c9a84c" opacity="0.75">MUSIC</text>

  <!-- Thin gold bottom rule -->
  <rect x="48" y="425" width="404" height="1" fill="#c9a84c" opacity="0.5"/>
  <rect x="48" y="430" width="404" height="2" fill="#c9a84c"/>
</svg>
